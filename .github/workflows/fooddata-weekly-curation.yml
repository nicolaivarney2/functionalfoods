name: Fooddata Weekly Curation (FF)

on:
  schedule:
    # Onsdag 06:00 UTC ≈ 07:00 dansk (vinter) / 08:00 (sommer) — efter morgenens katalog-sync
    - cron: '0 6 * * 3'
  workflow_dispatch:

jobs:
  fooddata-weekly-curation:
    runs-on: ubuntu-latest
    environment: FF
    steps:
      - name: Call FF weekly curation endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "SITE_URL GitHub variable is not set."
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET GitHub secret is not set."
            exit 1
          fi

          FORCE_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FORCE_FLAG="?force=true"
          fi

          echo "Calling fooddata weekly-curation on $SITE_URL ..."
          curl -fsS --max-time 300 --retry 3 --retry-delay 5 -X POST \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: $CRON_SECRET" \
            -o /tmp/fooddata-weekly-curation.json \
            "$SITE_URL/api/admin/fooddata/weekly-curation$FORCE_FLAG" || {
            echo "HTTP request failed."
            exit 1
          }
          echo "Svar fra endpoint:"
          cat /tmp/fooddata-weekly-curation.json
          echo ""
          if ! command -v jq >/dev/null 2>&1; then
            echo "jq mangler — springer success-check over."
            exit 0
          fi
          if ! jq -e '.success == true' /tmp/fooddata-weekly-curation.json >/dev/null 2>&1; then
            echo "Fejl: success er false."
            exit 1
          fi
