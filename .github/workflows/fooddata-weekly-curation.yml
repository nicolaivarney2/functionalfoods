name: Fooddata Weekly Curation (FF)

# Pull kurering fra fooddata → FF. Kører på GitHub runner (ikke Vercel HTTP)
# for at undgå 300s function timeout på /api/admin/fooddata/weekly-curation.

on:
  schedule:
    # Onsdag 06:00 UTC ≈ 07:00 dansk (vinter) / 08:00 (sommer)
    - cron: '0 6 * * 3'
  workflow_dispatch:

jobs:
  fooddata-weekly-curation:
    runs-on: ubuntu-latest
    environment: FF
    timeout-minutes: 45
    env:
      GROCERY_SUPABASE_URL: ${{ secrets.GROCERY_SUPABASE_URL }}
      GROCERY_SUPABASE_SECRET_KEY: ${{ secrets.GROCERY_SUPABASE_SECRET_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify required secrets
        run: |
          missing=0
          for v in GROCERY_SUPABASE_URL GROCERY_SUPABASE_SECRET_KEY NEXT_PUBLIC_SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!v}" ]; then
              echo "Missing: $v"
              missing=1
            fi
          done
          [ "$missing" = "0" ] || exit 1

      - name: Run weekly curation (FF)
        run: npx tsx scripts/fooddata-weekly-curation.ts --app=ff
