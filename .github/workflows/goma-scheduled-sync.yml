name: Goma Scheduled Sync (sunset)

# Goma er sunset — ingen scheduled kørsler. Eksisterende data bevares read-only.
# Nød-genaktivering: sæt GOMA_IMPORT_ENABLED=true i Vercel + kør workflow_dispatch manuelt.
on:
  workflow_dispatch:

jobs:
  goma-scheduled-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Goma sunset — springer over
        run: |
          echo "Goma scheduled sync er sunset."
          echo "Eksisterende produkt/tilbuds-data bevares uændret indtil fooddata cutover."
          echo "Aktivér kun med GOMA_IMPORT_ENABLED=true i Vercel ved nødtilfælde."
          exit 0
